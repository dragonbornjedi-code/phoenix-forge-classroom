  sub_expedition_board:
    work_types: [expedition]
    skills: [frontend-design, cline-essence]
    verify: [phoenix-forge-classroom-forge-profile/gradlew :teacher-app:assembleDebug]
    owns: [ExpeditionBoardScreen.kt, StartDayBottomSheet.kt, StartDayExport.kt]
  sub_forge_profile_core:
    work_types: [forge_profile, profile_ingest]
    skills: [android-kotlin-development]
    verify: [phoenix-forge-classroom-forge-profile/gradlew :forge-profile-app:assembleDebug]
    owns: [EventIngestCoordinator.kt, PublicStateEventProjector.kt, forge-profile-app]
  sub_student_quests:
    work_types: [student_quests, progression]
    skills: [android-kotlin-development, frontend-design]
    verify: [phoenix-forge-classroom-forge-profile/gradlew :student-app:assembleDebug]
