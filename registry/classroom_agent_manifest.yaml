  sub_gradle_build:
    work_types: [gradle_build]
    skills: [android-gradle-build-logic]
    verify: [registry/phoenix-forge-classroom.yaml verification_commands.build_all]
    owns: [settings.gradle.kts, build.gradle.kts, gradle libs]
  sub_verify_runner:
    work_types: [verify_test]
    skills: [cline-essence]
    verify: [scripts/phoenix-forge-classroom-verify-all.sh]
    owns: drift check, unit tests, smoke scripts

