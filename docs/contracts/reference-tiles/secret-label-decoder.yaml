# Reference Intent Tile — Secret Label Decoder
# Canonical integration test for Curriculum OS (schema 1.0)
#
# Sources (canonical pedagogy — not replaced):
#   - curriculum-of-life.md §1 Lesson pattern: Label Hunt
#   - starter-lessons-pack-01.md Lesson 1: Secret Label Decoder
#   - CURRICULUM_ATOMIZATION_GUIDE.md §3
#
# Runtime: CURRICULUM_RUNTIME_FLOW.md
# Proof: reference-tiles/README.md (10 checks)

schema_version: "1.0"
reference_tile: true
integration_test_id: "curriculum-os-v1-secret-label-decoder"

intent_tile:
  id: "ref-tile-secret-label-decoder-001"
  title: "Secret Label Decoder"
  description: "Match secret labels to real objects and explain what job each object does."

  # ── Curriculum mapping ─────────────────────────────────────────────────────
  curriculum_domain_id: COGNITIVE_ACADEMIC
  category: "Cognitive & Academic Foundations"
  subcategory_ids:
    - early_literacy
    - documentation_literacy
    - abstraction_mapping
  subcategory_display:
    - "Early Literacy"
    - "Documentation Literacy"
    - "Abstraction Mapping"
  lesson_pattern_id: label_hunt
  lesson_pattern_display: "Label Hunt"
  curriculum_source_refs:
    - "phoenix-forge-classroom-teacher-edition/docs/curriculum-of-life.md#1-cognitive--academic-foundations"
    - "phoenix-forge-classroom-teacher-edition/docs/starter-lessons-pack-01.md#lesson-1-secret-label-decoder"

  domain: MOSS
  default_difficulty: L1_GUIDED_IMITATION
  learner_stage: "5.5y"
  anchor_tags: ["Reading", "Literacy", "Indoor", "Documentation"]
  energy_level: MEDIUM
  environment_tags: ["Indoor", "Quiet", "Household"]
  estimated_duration: "10-15m"
  estimated_duration_low_demand: "3m"

  # Denormalized for Compass queries (from skill_atoms below)
  capability_ids:
    - VISUAL_DISCRIMINATION
    - SYMBOL_TO_OBJECT_MAPPING
    - OBJECT_FUNCTION_MAPPING
    - CATEGORY_GROUPING
    - VERBAL_RETRIEVAL

  skill_atom_ids:
    - label_hunt.match_label_to_object
    - label_hunt.explain_object_job
    - label_hunt.retrieve_label_later
    - label_hunt.transfer_label_pattern

  # ── Skill atoms (full definitions — reference implementation) ───────────────
  skill_atoms:
    - id: label_hunt.match_label_to_object
      lesson_pattern_id: label_hunt
      display_name: "Match label to object"
      capability_id: SYMBOL_TO_OBJECT_MAPPING
      also_exercises: [VISUAL_DISCRIMINATION]
      difficulty_levels:
        L1_GUIDED_IMITATION: "Adult models placing one label; child copies next label with hand-over-hand or immediate copy."
        L2_PROMPTED_EXECUTION: "Child places label after verbal cue ('find cup') or gesture toward object."
        L3_PARTIAL_INDEPENDENCE: "Child matches 3+ labels with at most one verbal prompt per label."
        L4_TRANSFER_GENERALIZATION: "Child matches labels on 3+ novel objects not used in prior sessions."
      evidence_types: [OBSERVATION, PHOTO, PROMPT_LEVEL_LOG]
      evidence_requirements:
        - field: matched_labels
          type: integer
          required: true
          description: "Count of labels correctly placed."
        - field: prompt_level
          type: enum
          required: true
          values: [model, verbal_prompt, gesture, independent]
      lesson_signals_on_success:
        engagement: "Stayed with matching through target label count."
        independence: "Prompt level reached independent on this atom."
      failure_signatures:
        - type: CONFUSION
          observables: ["randomly guesses without looking at label or object"]
          reset_intervention: "Reduce choices to two objects; ask 'What do your eyes notice?'"
          recovery_signal: RECOVERY
        - type: OVERLOAD
          observables: ["leaves task repeatedly", "throws or drops labels"]
          reset_intervention: "Reduce label count to 2; stand-and-move match only."
          recovery_signal: RECOVERY
        - type: SKILL_GAP
          observables: ["matches memorized positions only", "cannot match when object order changes"]
          reset_intervention: "Same labels, shuffle object positions; stay at L1."
      recovery_path: "Adult intentionally mis-labels one object; child fixes it (playful repair from starter lesson)."

    - id: label_hunt.explain_object_job
      lesson_pattern_id: label_hunt
      display_name: "Explain object job"
      capability_id: OBJECT_FUNCTION_MAPPING
      difficulty_levels:
        L1_GUIDED_IMITATION: "Child echoes adult phrase for object job after each match."
        L2_PROMPTED_EXECUTION: "Child answers 'What job does this do?' with one-word or short phrase after prompt."
        L3_PARTIAL_INDEPENDENCE: "Child explains job for 2+ objects without echoing."
        L4_TRANSFER_GENERALIZATION: "Child explains job for a novel object using same question frame."
      evidence_types: [OBSERVATION, PROMPT_LEVEL_LOG]
      evidence_requirements:
        - field: object_function_explained
          type: boolean
          required: true
        - field: object_function_examples
          type: string_list
          required: false
          description: "e.g. light → wake up room, cup → hold drink"
      lesson_signals_on_success:
        curiosity: "Unprompted job explanation or 'what job' question about another object."
        engagement: "Connects label to function without only naming object."
      failure_signatures:
        - type: CONFUSION
          observables: ["names object only", "repeats label text as job"]
          reset_intervention: "Model one job phrase; ask only on one familiar object."
        - type: AVOIDANCE
          observables: ["refuses to answer job question", "changes subject"]
          reset_intervention: "Skip job question this session; complete matching only; retry next exposure."
          recovery_signal: RECOVERY

    - id: label_hunt.retrieve_label_later
      lesson_pattern_id: label_hunt
      display_name: "Retrieve label later"
      capability_id: VERBAL_RETRIEVAL
      also_exercises: [WORKING_MEMORY]
      difficulty_levels:
        L1_GUIDED_IMITATION: "Adult points to label; child names object or vice versa together."
        L2_PROMPTED_EXECUTION: "End-of-session retrieval: adult points to 3 labels, child identifies 2 with cue."
        L3_PARTIAL_INDEPENDENCE: "Child identifies 3 labels from point-only prompts."
        L4_TRANSFER_GENERALIZATION: "Retrieval on labels placed in a new room or container."
      evidence_types: [OBSERVATION, PROMPT_LEVEL_LOG]
      evidence_requirements:
        - field: retrieval_correct_count
          type: integer
          required: true
        - field: retrieval_prompt_level
          type: enum
          required: true
          values: [model, verbal_prompt, gesture, independent]
      failure_signatures:
        - type: FATIGUE
          observables: ["retrieval fails only at end of session", "yawns, slumps, looks away"]
          reset_intervention: "Defer retrieval to next session; end on matching win."
        - type: SKILL_GAP
          observables: ["retrieves only immediately after placement"]
          reset_intervention: "Insert 30-second gap between last placement and retrieval."

    - id: label_hunt.transfer_label_pattern
      lesson_pattern_id: label_hunt
      display_name: "Transfer label pattern to new object"
      capability_id: CATEGORY_GROUPING
      also_exercises: [PATTERN_GENERALIZATION, COGNITIVE_FLEXIBILITY_SWITCHING]
      difficulty_levels:
        L1_GUIDED_IMITATION: "Adult adds one new label on new object; child watches model."
        L2_PROMPTED_EXECUTION: "Child places one new label on novel object with picture support."
        L3_PARTIAL_INDEPENDENCE: "Child labels 2 novel objects after one modeled example."
        L4_TRANSFER_GENERALIZATION: "Child creates or places new label for object adult did not demo."
      evidence_types: [OBSERVATION, PHOTO, DRAWING]
      evidence_requirements:
        - field: novel_objects_labeled
          type: integer
          required: false
          description: "Required when attempting L3/L4."
      failure_signatures:
        - type: SKILL_GAP
          observables: ["cannot transfer after memorizing fixed set", "memorizes but cannot transfer"]
          reset_intervention: "New object, same pattern; reduce to one label (curriculum cue)."
          linked_curriculum_cue: "If he memorizes but cannot transfer, try a new object with the same pattern."

  # ── Tile-level failure signatures (session-wide) ───────────────────────────
  failure_signatures:
    - type: CONFUSION
      observables: ["randomly guesses", "guesses without looking"]
      reset_intervention: "Reduce choices to two; 'What do your eyes notice?'"
      regulation_first: false
    - type: OVERLOAD
      observables: ["leaves task repeatedly", "frustration rises with full label set"]
      reset_intervention: "Reduce label count; physical movement match (stand, move label)."
      regulation_first: true
    - type: AVOIDANCE
      observables: ["rejects correction", "refusal mid-session"]
      reset_intervention: "Adult intentionally labels wrong object; child fixes (recovery play)."
      regulation_first: true
      maps_to_lesson_signal: frustration
    - type: FATIGUE
      observables: ["performance drops after 10+ minutes", "low energy window ignored"]
      reset_intervention: "Switch to low-demand: 3 labels in 3 minutes."
    - type: SKILL_GAP
      observables: ["cannot explain object job", "cannot retrieve after delay"]
      reset_intervention: "Drop to L1 on failing atom only; keep session short."

  # ── Lesson signals (all five — reference emits every pathway) ─────────────
  lesson_signals_template:
    ENGAGEMENT:
      observe: "Child stays with matching or retrieval for planned duration."
      strength_hint: "0.7+ if completed standard duration without leaving task."
    FRUSTRATION:
      observe: "Refusal, throwing labels, rejects correction, silly escalation."
      strength_hint: "Map to failure_signatures AVOIDANCE or OVERLOAD."
      failure_type_link: AVOIDANCE
    CURIOSITY:
      observe: "Unprompted job question, sound play, or 'bigger system' comment."
      strength_hint: "0.6+ if unprompted why/how question during session."
    INDEPENDENCE:
      observe: "Prompt level model → verbal → gesture → independent on any atom."
      strength_hint: "0.8+ if any atom logged independent."
    RECOVERY:
      observe: "Returned after pause, Recovery Hub, or mis-label repair game."
      strength_hint: "0.7+ if session continued after documented reset."

  # ── Memory hooks (StoryGraph + chronicle) ─────────────────────────────────
  memory_hooks:
    emotional_anchor: "First independent label match"
    narrative_seed_phrase: "Words are clues."
    npc_reaction_trigger: "DISCOVERY"
    npc_dialogue_hint: "Spark: 'That word is a secret code only you decoded.'"
    world_drift_bias: GALLERY_VITALITY_UP
    repeat_exposure_suggestion: "Re-run 3 labels in 3 minutes within 7-14 days if VERBAL_RETRIEVAL still L1-L2."
    repeat_exposure_days_min: 7
    repeat_exposure_days_max: 14
    story_continuity_thread: "thread:label_hunt → words_are_clues"

  # ── Field guide (executable — parity with starter lesson) ─────────────────
  field_guide:
    objective: "Ezra will match printed labels to real objects and explain one object by its job."
    why_it_matters: "This connects reading to useful information. Words become tools for finding, organizing, and solving."
    procedures:
      - step: 1
        text: "Show one label and say, 'This word is a clue. It says cup.'"
        atom_ids: [label_hunt.match_label_to_object]
      - step: 2
        text: "Model matching the label to the cup."
        atom_ids: [label_hunt.match_label_to_object]
        difficulty: L1_GUIDED_IMITATION
      - step: 3
        text: "Ask him to place the next label."
        atom_ids: [label_hunt.match_label_to_object]
      - step: 4
        text: "When he places it, ask, 'What job does this thing do?'"
        atom_ids: [label_hunt.explain_object_job]
      - step: 5
        text: "Put completed labels in the finished box or leave them attached."
      - step: 6
        text: "End with retrieval: point to 3 labels and ask, 'Which one says book?'"
        atom_ids: [label_hunt.retrieve_label_later]
    questions:
      - "What do your eyes notice?"
      - "What sound does this word start with?"
      - "What job does this object do?"
      - "Is this object also part of a bigger system?"
    alternative_paths:
      - name: low_demand
        text: "3 labels in 3 minutes; obvious objects only."
        default_difficulty: L1_GUIDED_IMITATION
      - name: make_easier
        text: "2 labels; pictures beside words; choose between two objects."
      - name: make_harder
        text: "Remove pictures; beginning sound sorting; child creates new label."
        atom_ids: [label_hunt.transfer_label_pattern]
        target_difficulty: L3_PARTIAL_INDEPENDENCE
    sensory_accommodations:
      - "Visual: picture label beside word."
      - "Sensory: stand and move label to object."
      - "Communication: point instead of saying."
      - "Transition: First 3 labels, then build."
    materials:
      - "Sticky notes or index cards"
      - "Marker"
      - "5-10 household objects"
      - "Optional picture cards"
      - "Finished box"
    primary_methods:
      - explicit_teaching
      - play_based_learning
      - retrieval_practice
      - udl_visual_supports

  # ── Expedition narrative (decorates — does not change plan) ─────────────────
  story_hooks:
    nouns: ["secret label", "decoder badge", "clue word", "object job"]
    verbs: ["match", "decode", "discover", "explain"]
    spark_guidance: "Spark treats each label as a secret code tied to a job in the house."
    day_story_frame: "The Rangers decode clue-words hidden on ordinary objects."

  # ── Student Edition (experience shell — no diagnostic language) ───────────
  student_edition:
    mission_title: "Secret Label Decoder"
    mission_summary: "Find the secret labels around the room and match them to the right objects."
    mission_cards:
      - "Find Cup"
      - "Find Book"
      - "Find Light"
    reward: "Decoder Badge"
    world_event_mapping:
      on_mission_complete:
        world_event_type: PHOTO_UPLOADED
        payload_tag: "decoder_moment"
        xp_reward: 30
        importance: 2
      on_decoder_badge:
        world_event_type: QUEST_COMPLETE
        payload_quest_title: "Decode three clue-words"
        xp_reward: 25
        importance: 2
    notes: "Do not surface prompt levels, failure types, or teacher audit language."

  # ── CMOS ingestion ─────────────────────────────────────────────────────────
  completion_options:
    - COMPLETE_ONLY
    - QUICK_NOTE
    - DEEP_REFLECTION
  memory_event_template:
    eventType: DISCOVERY
    default_significance: 0.55
    narrative_title_default: "Secret Label Decoder"
    narrative_summary_default: "Matched clue-words to objects and explored what jobs things do."

  # ── Evidence template (MANDATORY — not completed: true alone) ─────────────
  evidence_template:
    mandatory: true
    reject_completion_without_required_fields: true
    evidence_types: [OBSERVATION, PHOTO, PROMPT_LEVEL_LOG]
    required_fields:
      - name: matched_labels
        type: integer
        min: 0
        description: "Number of labels correctly matched this session."
      - name: prompt_level
        type: enum
        values: [model, verbal_prompt, gesture, independent]
        description: "Highest prompt level achieved on match atom."
      - name: object_function_explained
        type: boolean
        description: "Whether child explained at least one object job."
      - name: photo_uri
        type: string
        required: false
        description: "Photo of labeled objects (strongly encouraged for 2046 test)."
      - name: teacher_note
        type: string
        required: false
        description: "Which labels were independent; friction observed."
    atom_outcome_slots:
      - atom_id: label_hunt.match_label_to_object
        required: true
      - atom_id: label_hunt.explain_object_job
        required: true
      - atom_id: label_hunt.retrieve_label_later
        required: false
      - atom_id: label_hunt.transfer_label_pattern
        required: false
    session_derived_capability_updates:
      description: "Compass updates from atom_outcomes + prompt_level delta, not tile checkbox."
      rules:
        - capability_id: SYMBOL_TO_OBJECT_MAPPING
          when: "matched_labels >= 3 AND prompt_level in [gesture, independent]"
          increment: "observed_independence"
        - capability_id: OBJECT_FUNCTION_MAPPING
          when: "object_function_explained == true"
          increment: "observed"
        - capability_id: VERBAL_RETRIEVAL
          when: "retrieval_correct_count >= 2"
          increment: "observed"

  # ── Example session payload (for harness / manual proof) ──────────────────
  example_lesson_session:
    session_id: "example-session-001"
    intent_tile_id: "ref-tile-secret-label-decoder-001"
    started_at_epoch_millis: 0
    completed_at_epoch_millis: 0
    difficulty_reached: L2_PROMPTED_EXECUTION
    evidence:
      matched_labels: 4
      prompt_level: gesture
      object_function_explained: true
      photo_uri: "media/examples/label_hunt_2026.jpg"
      teacher_note: "Independent on cup and book; needed verbal for light job."
    atom_outcomes:
      - atom_id: label_hunt.match_label_to_object
        capability_id: SYMBOL_TO_OBJECT_MAPPING
        difficulty: L2_PROMPTED_EXECUTION
        success: true
        prompt_level: gesture
      - atom_id: label_hunt.explain_object_job
        capability_id: OBJECT_FUNCTION_MAPPING
        difficulty: L2_PROMPTED_EXECUTION
        success: true
        notes: "Said light wakes up the room."
      - atom_id: label_hunt.retrieve_label_later
        capability_id: VERBAL_RETRIEVAL
        difficulty: L1_GUIDED_IMITATION
        success: true
        prompt_level: verbal_prompt
    lesson_signals:
      - type: ENGAGEMENT
        strength: 0.8
        source: TEACHER_OBSERVATION
      - type: CURIOSITY
        strength: 0.65
        source: TEACHER_OBSERVATION
        atom_id: label_hunt.explain_object_job
      - type: INDEPENDENCE
        strength: 0.5
        source: PROMPT_LEVEL_DELTA
        atom_id: label_hunt.match_label_to_object
    failure_encountered: null
    recovery_applied: false

  # ── MemoryEvent preview (proof step 6) ────────────────────────────────────
  example_memory_event:
    eventType: DISCOVERY
    sourceTileId: "ref-tile-secret-label-decoder-001"
    narrative:
      title: "Secret Label Decoder"
      summary: "Matched clue-words to objects and explored what jobs things do."
    impact:
      wispAffinities:
        MOSS: 1.0
      threadRef: thread_pattern_finder
    bundled_metadata:
      intent_tile_schema_version: "1.0"
      capability_ids_touched: [SYMBOL_TO_OBJECT_MAPPING, OBJECT_FUNCTION_MAPPING, VERBAL_RETRIEVAL]
      memory_hooks:
        narrative_seed_phrase: "Words are clues."
        emotional_anchor: "First independent label match"
    story_graph_projection:
      continuity_thread: "thread:label_hunt → words_are_clues"
      callback_line_template: "This happened because you came back to decode clue-words in the house."
      emotional_impact_hint: 0.55

  # ── Student simulation preview (proof step 8) ───────────────────────────
  example_world_event:
    type: PHOTO_UPLOADED
    payload:
      tag: "decoder_moment"
    xp_reward: 30
    importance: 2
    drift_bias: GALLERY_VITALITY_UP

  # ── Continuity ───────────────────────────────────────────────────────────
  linked_identity_threads:
    - thread_pattern_finder
    - thread_builder
  linked_themes:
    month: Exploration
    week: Signals

  # ── Weekly audit mapping (proof step 10) ──────────────────────────────────
  weekly_audit_mapping:
    one_win_observed: "object_function_explained OR prompt_level independent"
    one_friction_point: "failure_encountered OR FRUSTRATION signal strength > 0.5"
    one_method_that_worked: "field_guide.sensory_accommodations used"
    one_metric_to_track: "matched_labels + prompt_level next week"
    overload_signs: "OVERLOAD failure or leaves task repeatedly"

  tile_state_default: DRAFT
