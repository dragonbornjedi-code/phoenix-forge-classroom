name: Classroom assemble debug APKs

on:
  push:
    branches: [main, stage/offline]
    paths:
      - 'phoenix-forge-classroom-forge-profile/**'
      - 'shared/**'
      - '.github/workflows/classroom-assemble-debug.yml'
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Assemble debug APKs
        working-directory: phoenix-forge-classroom-forge-profile
        run: |
          chmod +x gradlew
          ./gradlew :forge-profile-app:assembleDebug :student-app:assembleDebug :teacher-app:assembleDebug --no-daemon

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          retention-days: 14
          path: |
            phoenix-forge-classroom-forge-profile/forge-profile-app/build/outputs/apk/debug/*.apk
            phoenix-forge-classroom-forge-profile/student-app/build/outputs/apk/debug/*.apk
            phoenix-forge-classroom-forge-profile/teacher-app/build/outputs/apk/debug/*.apk
